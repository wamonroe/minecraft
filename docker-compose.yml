x-server-env: &server-env
  # User and group ids that own the files
  # Use `id -u` and `id -g` to get your User ID and Group ID
  GID: 20
  UID: 501
  # Default config
  ENABLE_AUTOPAUSE: true
  MAX_MEMORY: 4G
  MAX_TICK_TIME: -1
  # Default properties
  ENABLE_WHITELIST: true
  ENFORCE_WHITELIST: true
  EULA: true
  SPAWN_PROTECTION: 0

x-backup-env: &backup-env
  BACKUP_INTERVAL: "24h"
  BACKUP_ON_STARTUP: false
  INITIAL_DELAY: 0
  PAUSE_IF_NO_PLAYERS: true
  PRUNE_BACKUPS_COUNT: 4
  PRUNE_BACKUPS_DAYS: -1

services:
  # Use mc-router to run multiple servers on the same external port
  mc_router: 
    image: itzg/mc-router
    restart: always
    depends_on:
      - adventurecraft
      - skyblock
    environment:
      MAPPING: |
        adventurecraft.monroepost.com=adventurecraft:25565
        skyblock.monroepost.com=skyblock:25565
    ports:
      - "25565:25565"

  # Adventurecraft 2026 server (1.21.6)
  # adventurecraft.monroepost.com
  adventurecraft:
    image: itzg/minecraft-server
    restart: unless-stopped
    environment:
      <<: *server-env
      # Server version and modpack
      MODPACK_PLATFORM: MODRINTH
      MODRINTH_MODPACK: /modpacks/Adventurecraft 26.2.2.mrpack
      VERSION: 1.21.1
      # Server properties
      DIFFICULTY: hard
      MOTD: "Adventurecraft 2026 Server"
      PVP: true
      SEED: 2149235438587265695
      VANILLATWEAKS_SHARECODE: dtk1Gx,mzaofc
    volumes:
      - ./data/adventurecraft26:/data
      - ./modpacks:/modpacks:ro

  # Skyblock 2026 server (1.21.6)
  # skyblock.monroepost.com
  skyblock:
    image: itzg/minecraft-server
    restart: unless-stopped
    environment:
      <<: *server-env
      # Server type and version
      TYPE: PAPER
      VERSION: 26.1.2
      # Server properties
      MOTD: "Skyblock 2026 Server"
      PVP: false
    volumes:
      - ./data/skyblock26:/data
      - ./plugins/skyblock26:/plugins:ro

  backup_adventurecraft:
    image: itzg/mc-backup
    restart: always
    depends_on:
      adventurecraft:
        condition: service_healthy
    environment:
      <<: *backup-env
      RCON_HOST: adventurecraft
    volumes:
      - ./data/adventurecraft26:/data:ro
      - ./backups/adventurecraft26:/backups

  backup_skyblock:
    image: itzg/mc-backup
    restart: always
    depends_on:
      skyblock:
        condition: service_healthy
    environment:
      <<: *backup-env
      RCON_HOST: skyblock
    volumes:
      - ./data/skyblock26:/data:ro
      - ./backups/skyblock26:/backups
